name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    # 🐍 Backend Build
    - name: Build Backend Docker
      run: docker build -t backend ./backend

    # ⚛️ Frontend Build
    - name: Build Frontend Docker
      run: docker build -t frontend ./frontend

    # ✅ Success Message
    - name: Done
      run: echo "Build Successful 🚀"